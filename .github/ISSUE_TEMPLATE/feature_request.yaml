name: Feature request
description: Suggest an idea.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to send suggestions for improvements to IntellectX.

        Do not include secrets, private learner data, or payment credentials in feature requests.

        Thanks for helping to make IntellectX better.
  - type: textarea
    id: request
    attributes:
      label: Tell us about your feature request
      description: Describe what you'd like to see added or improved.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you looking to solve?
      description: Tell us how and why would implementing your suggestion would help.
    validations:
      required: true
  - type: textarea
    id: additional-information
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or illustrations about your suggestion here.
  - type: dropdown
    id: priority
    attributes:
      label: How important is this suggestion to you?
      options:
        - Nice to have
        - Important
        - Critical
      default: 0
    validations:
      required: true
