<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>IntellectX is temporarily unavailable</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f3f3;
        color: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding:
          calc(1.5rem + env(safe-area-inset-top))
          calc(1.25rem + env(safe-area-inset-right))
          calc(1.5rem + env(safe-area-inset-bottom))
          calc(1.25rem + env(safe-area-inset-left));
        background: #f3f3f3;
        color: #111111;
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.88);
        padding: 1.5rem;
        box-shadow: 0 1.5rem 4rem rgba(15, 23, 42, 0.1);
        text-align: center;
      }

      .mark {
        width: 3rem;
        height: 3rem;
        margin: 0 auto 1rem;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #111111;
        color: #ffffff;
        font-size: 1.25rem;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
        line-height: 1.1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 1rem 0 0;
        color: #666666;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      button {
        width: 100%;
        min-height: 3rem;
        margin-top: 1.5rem;
        border: 0;
        border-radius: 0.75rem;
        background: #111111;
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      @media (prefers-color-scheme: dark) {
        :root,
        body {
          background: #252525;
          color: #f7f7f7;
        }

        main {
          border-color: rgba(255, 255, 255, 0.1);
          background: rgba(33, 33, 33, 0.94);
        }

        .mark,
        button {
          background: #f7f7f7;
          color: #191919;
        }

        p {
          color: #b8b8b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">IX</div>
      <h1>IntellectX is temporarily unavailable</h1>
      <p>
        Check your internet connection and try again. Your local study data remains on this device while the app
        reconnects.
      </p>
      <button
        type="button"
        onclick="window.location.replace('https://intellect-x-coral.vercel.app/mobile-quizzes')"
      >
        Try again
      </button>
    </main>
  </body>
</html>
